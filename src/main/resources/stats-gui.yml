      - "&fTotal Luck:  &b&l%luckrng_luck_total%"
  table:
    material: BOOK
    name: "&e&lRNG Statistics"
    format: "&7- &e{key}&7: &b{count} runs"
    lore:
      - "&7Riwayat run untuk setiap table:"
